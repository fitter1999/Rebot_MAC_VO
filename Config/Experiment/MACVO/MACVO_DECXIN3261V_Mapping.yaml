#
# DECXIN-3261V dense-mapping-oriented config.
# Based on MACVO_Fast/DECXIN Quality, but enables MAC-VO's mapping branch.
#

Common:
  device: &device cuda

Odometry:
  name: MACVO-DECXIN3261V-Mapping
  args:
    device: *device
    edgewidth: 32
    num_point: 200
    match_cov_default: 0.25
    profile: false
    mapping: true
    mapping_num_point: 2000

  cov:
    obs:
      type: MatchCovariance
      args:
        device: *device
        kernel_size: 31
        match_cov_default: 0.25
        min_depth_cov: 0.05
        min_flow_cov: 0.25

  keypoint:
    type: CovAwareSelector_NoDepth
    args:
      device: *device
      kernel_size: 7
      mask_width: 32
      max_match_cov: 100.0

  mappoint:
    type: MappingPointSelector
    args:
      device: *device
      max_depth: 5.0
      max_depth_cov: 0.005
      mask_width: 32

  frontend:
    type: CUDAGraph_FlowFormerCovFrontend
    args:
      device: *device
      weight: ./Model/MACVO_FrontendCov.pth
      enc_dtype: fp16
      dec_dtype: bf16
      decoder_depth: 12
      enforce_positive_disparity: false

  motion:
    type: StaticMotionModel
    args:

  outlier:
    type: CovarianceSanityFilter
    args:

  postprocess:
    type: MotionInterpolate
    args:

  keyframe:
    type: AllKeyframe
    args:

  optimizer:
    type: TwoFrame_PGO
    args:
      device: cpu
      vectorize: true
      parallel: true
      graph_type: disp
      autodiff: false

Data: !include ../../Sequence/TartanAir_example.yaml
Preprocess: !include ../Common/Preprocess.yaml
